<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Listosoft</title>
    <meta name="description" content="Página no encontrada en Listosoft.">
    <link rel="stylesheet" href="/Inicio/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="assets/IsotipoListosoft.png">
</head>

<body>
    <div id="navbar-container"></div>

    <section class="section bg-light error404-page" id="inicio">
        <div class="container">
            <div class="legal-content-card error404-card fade-in">
                <div class="error404-icon" aria-hidden="true">
                    <i class="fa-solid fa-compass-drafting"></i>
                </div>
                <p class="error404-code">404</p>
                <h2 class="error404-title">Esta ruta no está disponible</h2>
                <p class="error404-text">Puede que la página haya cambiado de ubicación o que el enlace esté incompleto.</p>

                <div class="error404-actions">
                    <a href="https://listosoft.com" class="btn btn-primary">Volver al inicio</a>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="components.js"></script>
    <script src="script.js"></script>
</body>

</html>
